<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעקב תפוקות — כללית</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>מעקב תפוקות</h1>
  <div class="month-selector">
    <select id="monthDropdown" class="month-dropdown" onchange="selectMonth(this.value)"></select>
  </div>
  <div class="header-actions">
    <button class="header-btn" onclick="generateMonth()" title="צור חודש מתבנית">+🗓</button>
  </div>
</div>

<!-- Summary Ribbon -->
<div class="summary" id="summary" style="grid-template-columns: repeat(4, 1fr); gap: 0;">
  <!-- תפוקות -->
  <div style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; border-left: 1px solid var(--border);">
    <div class="stat">
      <div class="stat-label">יעד</div>
      <div style="display: flex; justify-content: center;">
        <input type="number" id="statTafukotGoal" min="0" style="width: 40px; text-align: center; border: 1px solid var(--border); border-radius: 4px; font-size: 18px; font-weight: 700; font-family: inherit; padding: 2px;" onchange="saveTafukotGoal(this.value)">
      </div>
    </div>
    <div style="font-size: 12px; color: var(--muted); padding-top: 16px;">←</div>
    <div class="stat">
      <div class="stat-label">תפוקות</div>
      <div class="stat-value" id="statTafukotTotal">-</div>
    </div>
    <div class="stat" id="statTafukotDiff" style="padding-top: 16px;"></div>
  </div>
  <!-- 50038 -->
  <div style="display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; border-left: 1px solid var(--border);">
    <div class="stat">
      <div class="stat-label">50038</div>
      <div style="display: flex; align-items: center; gap: 4px; justify-content: center;">
        <input type="number" id="sikumimGoal" min="0" style="width: 32px; text-align: center; border: 1px solid var(--border); border-radius: 4px; font-size: 16px; font-weight: 700; font-family: inherit; padding: 2px;" onchange="saveSikumimGoal(this.value)">
        <span style="font-size: 11px; color: var(--muted);">←</span>
        <span style="font-size: 16px; font-weight: 700;" id="statSikumimDone">0</span>
      </div>
      <div class="stat-sub" style="font-size: 11px; color: var(--accent);">נשאר <span id="statSikumimLeft">0</span></div>
    </div>
  </div>
  <!-- 50016 -->
  <div style="display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; border-left: 1px solid var(--border);">
    <div class="stat">
      <div class="stat-label">50016</div>
      <div style="display: flex; align-items: center; gap: 4px; justify-content: center;">
        <input type="number" id="hadrachotGoal" min="0" style="width: 32px; text-align: center; border: 1px solid var(--border); border-radius: 4px; font-size: 16px; font-weight: 700; font-family: inherit; padding: 2px;" onchange="saveHadrachotGoal(this.value)">
        <span style="font-size: 11px; color: var(--muted);">←</span>
        <span style="font-size: 16px; font-weight: 700;" id="statHadrachotDone">0</span>
      </div>
      <div class="stat-sub" style="font-size: 11px; color: var(--accent);">נשאר <span id="statHadrachotLeft">0</span></div>
    </div>
  </div>
  <!-- שלטים -->
  <div style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px;">
    <div class="stat">
      <div class="stat-label">יעד</div>
      <div style="display: flex; justify-content: center;">
        <input type="number" id="statSheletGoal" min="0" style="width: 40px; text-align: center; border: 1px solid var(--border); border-radius: 4px; font-size: 18px; font-weight: 700; font-family: inherit; padding: 2px;" onchange="saveSheletGoal(this.value)">
      </div>
    </div>
    <div style="font-size: 12px; color: var(--muted); padding-top: 16px;">←</div>
    <div class="stat">
      <div class="stat-label">שלטים</div>
      <div class="stat-value" id="statSheletTotal">-</div>
    </div>
    <div class="stat" id="statSheletDiff" style="padding-top: 16px;"></div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" data-tab="monthly" onclick="switchTab('monthly')">חודשי</button>
  <button class="tab" data-tab="shelet" onclick="switchTab('shelet')">שלטים</button>
  <button class="tab" data-tab="todos" onclick="switchTab('todos')">לעשות</button>
  <button class="tab" data-tab="kids" onclick="switchTab('kids')">ילדים</button>
</div>

<!-- Content -->
<div class="content" id="content">
  <div class="loading">טוען...</div>
</div>

<!-- FAB: Quick Add -->
<button class="fab" onclick="quickAdd()" title="הוסף שורה">+</button>

<!-- Add Entry Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2 id="modalTitle">הוסף שורה</h2>
    <label>תאריך</label>
    <input type="date" id="modalDate">
    <label>שעה</label>
    <input type="time" id="modalTime" value="08:00">
    <label>שם</label>
    <input type="text" id="modalName" placeholder="שם הילד/ה או אבחון">
    <label>קוד טיפול</label>
    <select id="modalCode">
      <option value="50011">50011 — טיפול פרטני</option>
      <option value="50008">50008 — אבחון</option>
      <option value="50016">50016 — הדרכה</option>
      <option value="50042">50042 — קוד 50042</option>
      <option value="50038">50038 — סיכום טיפול</option>
    </select>
    <label>כמה שורות (לאבחון = 3)</label>
    <input type="number" id="modalSlots" value="1" min="1" max="5">
    <label>סטטוס</label>
    <select id="modalStatus">
      <option value="projected">צפוי</option>
      <option value="done_not_logged">בוצע — לא נרשם</option>
      <option value="logged">נרשם בקליקס</option>
    </select>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveNewEntry()">שמור</button>
      <button class="btn btn-secondary" onclick="closeModal('addModal')">ביטול</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app.js"></script>
</body>
</html>
